        method: GET
        scripts:
          afterResponse: |-
            insomnia.test('Should Load Motels Index with Status 200', () => {
            	insomnia.expect(insomnia.response.code).to.equal(200);
            });

            if (insomnia.response.code === 200) {
            	const responseBody = insomnia.response.body.toString();
            	
            	try {
            		const motels = JSON.parse(responseBody);
            		if (motels && motels.length > 0) {
            			insomnia.environment.set('active_show_id', motels[0]._id);
            		}
            	} catch (e) {
            		const mongoIdMatch = responseBody.match(/[0-9a-fA-F]{24}/g);
            		
            		if (mongoIdMatch) {
            			insomnia.environment.set('active_show_id', mongoIdMatch[0])
            		}
            	}
            }
        settings:
          renderRequestBody: true
          encodeUrl: true
          followRedirects: global
          cookies:
            send: true
            store: true
          rebuildPath: true
